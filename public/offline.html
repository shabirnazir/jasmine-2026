<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Jasmine Prov Store</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", "Oxygen",
          "Ubuntu", "Cantarell", "Fira Sans", "Droid Sans", "Helvetica Neue",
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .offline-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 40px;
        max-width: 500px;
        text-align: center;
      }

      .offline-icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 20px;
        background: #f0f0f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .offline-description {
        color: #666;
        margin-bottom: 30px;
        font-size: 16px;
        line-height: 1.6;
      }

      .offline-tips {
        background: #f9f9f9;
        border-left: 4px solid #667eea;
        padding: 20px;
        border-radius: 4px;
        text-align: left;
        margin-bottom: 30px;
      }

      .offline-tips h3 {
        color: #333;
        margin-bottom: 10px;
        font-size: 14px;
      }

      .offline-tips ul {
        list-style: none;
        color: #666;
        font-size: 14px;
      }

      .offline-tips li {
        margin-bottom: 8px;
        padding-left: 20px;
        position: relative;
      }

      .offline-tips li:before {
        content: "✓";
        position: absolute;
        left: 0;
        color: #667eea;
        font-weight: bold;
      }

      .offline-actions {
        display: flex;
        gap: 10px;
        margin-top: 30px;
      }

      button {
        flex: 1;
        padding: 12px 20px;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
      }

      .retry-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .retry-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      }

      .home-btn {
        background: #f0f0f0;
        color: #333;
      }

      .home-btn:hover {
        background: #e0e0e0;
      }

      @media (max-width: 480px) {
        .offline-container {
          padding: 30px 20px;
        }

        h1 {
          font-size: 24px;
        }

        .offline-actions {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="offline-icon">📡</div>
      <h1>You're Offline</h1>
      <p class="offline-description">
        It looks like you've lost your internet connection. Some features may be
        unavailable until you're back online.
      </p>

      <div class="offline-tips">
        <h3>What you can do:</h3>
        <ul>
          <li>View previously loaded pages</li>
          <li>Check stored data and information</li>
          <li>Draft messages (they'll sync when online)</li>
        </ul>
      </div>

      <div class="offline-actions">
        <button class="retry-btn" onclick="location.reload()">Retry</button>
        <button class="home-btn" onclick="location.href = '/'">Go Home</button>
      </div>
    </div>

    <script>
      // Listen for when connection is restored
      window.addEventListener("online", () => {
        console.log("Back online!");
        // Optional: Show a notification or reload the page
      });
    </script>
  </body>
</html>
